<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster Cycling</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;800&display=swap');

    :root {
      --neon-pink:   #FF1493;
      --neon-blue:   #00B4FF;
      --neon-yellow: #FFD700;
      --neon-orange: #FF6B00;
      --bg:          #080808;
      --card-bg:     #111111;
      --card-border: rgba(255,20,147,0.25);
      --text:        #F0F0F0;
      --text-dim:    rgba(240,240,240,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 48px;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      background: #000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,20,147,0.3);
      box-shadow: 0 0 24px rgba(255,20,147,0.15);
    }
    .topbar img.logo-img {
      height: 64px;
      width: auto;
      display: block;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      margin: 24px 16px 0;
      max-width: 480px;
      width: calc(100% - 32px);
      border: 1px solid var(--card-border);
      box-shadow: 0 0 32px rgba(255,20,147,0.08), 0 8px 32px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 22px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge.grote-ronde { background: rgba(0,100,255,0.15); color: #4DA6FF; border: 1px solid rgba(0,100,255,0.4); }
    .badge.klassiek    { background: rgba(0,200,80,0.12);  color: #4DFF88; border: 1px solid rgba(0,200,80,0.4); }
    .badge.wk          { background: rgba(255,215,0,0.12); color: #FFD700; border: 1px solid rgba(255,215,0,0.4); }
    .badge.memorabel   { background: rgba(255,40,40,0.12); color: #FF6060; border: 1px solid rgba(255,40,40,0.4); }

    .card-id {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      padding-top: 4px;
      white-space: nowrap;
      font-family: 'Orbitron', monospace;
    }

    .card-body { padding: 0 22px 22px; }

    .renner {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
      text-shadow: 0 0 20px rgba(255,20,147,0.3);
    }
    .race {
      font-size: 0.85rem;
      color: var(--neon-blue);
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .nat {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 18px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0 22px 18px;
    }

    .description {
      font-size: 0.97rem;
      line-height: 1.7;
      color: rgba(240,240,240,0.8);
      margin-bottom: 20px;
    }

    /* ── YEAR REVEAL ── */
    .reveal-wrap { margin-top: 4px; }

    .btn-reveal {
      width: 100%;
      padding: 16px;
      background: transparent;
      color: var(--neon-pink);
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid var(--neon-pink);
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      font-family: 'Inter', Arial, sans-serif;
      box-shadow: 0 0 16px rgba(255,20,147,0.2), inset 0 0 16px rgba(255,20,147,0.04);
      transition: all 0.2s;
    }
    .btn-reveal:hover {
      background: rgba(255,20,147,0.1);
      box-shadow: 0 0 28px rgba(255,20,147,0.4), inset 0 0 16px rgba(255,20,147,0.08);
    }
    .btn-reveal:active { transform: scale(0.97); }

    .year-display {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 24px 20px;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.3);
      box-shadow: 0 0 40px rgba(255,215,0,0.12);
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .year-display.visible { display: flex; }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .year-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--neon-yellow);
      font-family: 'Orbitron', monospace;
    }
    .year-number {
      font-size: 4.5rem;
      font-weight: 900;
      color: var(--neon-yellow);
      line-height: 1;
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,215,0,0.3);
    }
    .year-sub {
      font-size: 0.8rem;
      color: rgba(255,215,0,0.5);
      text-align: center;
    }

    /* ── DIFFICULTY ── */
    .diff-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .diff-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .diff-dots { display: flex; gap: 5px; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .dot.filled {
      background: var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink);
      border-color: var(--neon-pink);
    }

    /* ── NOT FOUND ── */
    .not-found {
      color: var(--text);
      text-align: center;
      padding: 60px 20px;
    }
    .not-found h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: var(--neon-pink);
      font-family: 'Orbitron', monospace;
      text-shadow: 0 0 20px var(--neon-pink);
    }
    .not-found p { color: var(--text-dim); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 32px;
      text-align: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.68rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>

  "HC064": { jaar:1995, cat:"Memorabel Moment", renner:"Fabio Casartelli", nat:"🇮🇹 Italië", race:"Tour de France", kort:"Een olimpisch kampioen komt nooit aan in de vallei — het wielrennen rouwt om een van zijn eigen", lang:"Fabio Casartelli overleed na een val op de afdaling van de Col de Portet d'Aspet tijdens de Tour. De volgende dag won zijn ploeggenoot Lance Armstrong de rit ter nagedachtenis.", diff:1 },

  "HC069": { jaar:2013, cat:"Memorabel Moment", renner:"Lance Armstrong", nat:"🇺🇸 Verenigde Staten", race:"Oprah Winfrey-interview", kort:"De meest gedecoreerde wielrenner ter wereld geeft in een televisieoptreden toe jarenlang systematisch gedopeerd te hebben", lang:"Lance Armstrong gaf in een interview met Oprah Winfrey toe dat hij tijdens al zijn Tour-overwinningen gedopeerd had. Zijn zeven titels waren op dat moment al eerder geschrapt.", diff:1 },
  "HC070": { jaar:2015, cat:"Memorabel Moment", renner:"Chris Froome", nat:"🇬🇧 Groot-Brittannië", race:"Tour de France — Mont Ventoux", kort:"Na een botsing met een motorfiets op Mont Ventoux verlaat de geletruidrager zijn fiets en holt te voet de berg op", lang:"Chris Froome moest tijdens de Tour te voet verder na een botsing met motorfietsen op Mont Ventoux. Het UCI kende hem daarna 30 seconden terug toe.", diff:1 },
  "HC071": { jaar:2020, cat:"Memorabel Moment", renner:"Pogačar vs Roglič", nat:"🇸🇮 Slovenië", race:"Tour de France — slottijdrit", kort:"In de laatste tijdrit verschuift de macht: de zekere winnaar verliest alles in een halve minuut", lang:"Op de voorlaatste dag van de Tour verwoestte Tadej Pogačar het tijdrijden van Primož Roglič volledig op La Planche des Belles Filles en greep zo de gele trui.", diff:1 },
  "HC072": { jaar:2021, cat:"Memorabel Moment", renner:"Mark Cavendish", nat:"🇬🇧 Groot-Brittannië", race:"Tour de France", kort:"Een renner die men dood waande in de Tour breekt het absolute record van sprinterlegende Eddy Merckx", lang:"Mark Cavendish won zijn 34e Touretappe en evenaarde zo het record van Eddy Merckx. Later dat seizoen brak hij het definitief.", diff:1 },
  "HC073": { jaar:2021, cat:"Memorabel Moment", renner:"Sonny Colbrelli", nat:"🇮🇹 Italië", race:"Paris-Roubaix / Hartaanval", kort:"Maanden na zijn overwinning in de Hel van het Noorden moet een renner stoppen door een hartstilstand tijdens een koers", lang:"Sonny Colbrelli won Paris-Roubaix emotioneel. Maanden later kreeg hij een hartstilstand tijdens een koers en moest hij zijn carrière beëindigen.", diff:2 },
  "HC074": { jaar:2022, cat:"Memorabel Moment", renner:"Remco Evenepoel", nat:"🇧🇪 België", race:"Vuelta + WK", kort:"Een Belg wint in hetzelfde jaar een grote ronde én het wereldkampioenschap — voor het eerst in decennia", lang:"Remco Evenepoel won de Vuelta en het WK in hetzelfde seizoen — een combinatie die al generaties niet meer voorgekomen was.", diff:2 },
  "HC075": { jaar:2024, cat:"Memorabel Moment", renner:"Jonas Vingegaard", nat:"🇩🇰 Denemarken", race:"Itzulia Baskenland — crash", kort:"De regerende Tourchampion valt in het voorjaar zwaar en breekt meerdere ribben en zijn sleutelbeen", lang:"Jonas Vingegaard viel zwaar tijdens de Itzulia en liep gebroken ribben, een sleutelbeen en een klaplong op. Zijn Tour-deelname leek onzeker maar hij startte toch.", diff:1 },
  "HC076": { jaar:1996, cat:"Memorabel Moment", renner:"Bjarne Riis", nat:"🇩🇰 Denemarken", race:"Dopingbekentenis", kort:"De Tourwinnaar van een decennium eerder erkent dat hij zijn zege behaalde met verboden middelen", lang:"Bjarne Riis gaf toe dat hij EPO had gebruikt tijdens zijn Touroverwinning. Hij werd 'meneer 60%' genoemd vanwege zijn hematocrietwaarde.", diff:2 },
  "HC077": { jaar:2003, cat:"Memorabel Moment", renner:"Lance Armstrong", nat:"🇺🇸 Verenigde Staten", race:"Tour de France — Joseba Beloki crash", kort:"Een dramatische val van een concurrent redt de geletruidrager van een zware valpartij in de afdaling", lang:"In de afdaling raakte Joseba Beloki de controle kwijt en viel zwaar. Armstrong week over een veld uit om de val te vermijden — een van de meest memorabele improvisaties ooit.", diff:3 },
  "HC078": { jaar:2012, cat:"Memorabel Moment", renner:"Team Sky", nat:"🇬🇧 Groot-Brittannië", race:"Tour de France", kort:"Een Brits team revolutioneert de wielertactiek met data, marginal gains en een onverslaanbare trein", lang:"Team Sky domineerde de Tour met een totaal nieuwe aanpak: data-gedreven training, marginal gains en een ploeg gebouwd rond het beschermen van één leider.", diff:3 },
  "HC079": { jaar:2018, cat:"Memorabel Moment", renner:"Chris Froome", nat:"🇬🇧 Groot-Brittannië", race:"Giro d'Italia — rit 19", kort:"Met nog tachtig kilometer te rijden ontsnapt de Giro-leider solo en rijdt hij iedereen op een minuut", lang:"Chris Froome viel solo aan op de afdaling van de Colle delle Finestre met nog 80 km te gaan en won zo de Giro op sensationele wijze.", diff:1 },
  "HC080": { jaar:2019, cat:"Memorabel Moment", renner:"Chris Froome", nat:"🇬🇧 Groot-Brittannië", race:"Training crash", kort:"De viervoudige Tourwinnaar crasht zwaar op een trainingsritje en vecht voor zijn leven in het ziekenhuis", lang:"Chris Froome crashte zwaar tijdens een verkenning van een tijdritparcours en liep levensbedreigende verwondingen op. Zijn terugkeer naar het wielrennen was een wonder.", diff:2 },
  "HC081": { jaar:2022, cat:"Memorabel Moment", renner:"Jonas Vingegaard", nat:"🇩🇰 Denemarken", race:"Tour de France — Col du Granon", kort:"Op een epische bergrit verslaat een Deen de beste klimmer van zijn generatie en niemand kon hem volgen", lang:"Jonas Vingegaard reed Tadej Pogačar op de Col du Granon volledig kapot en pakte daarmee de gele trui. De beelden van Pogačar die zijn hoofd schudt gingen de wereld over.", diff:1 },
  "HC082": { jaar:2017, cat:"Memorabel Moment", renner:"Peter Sagan", nat:"🇸🇰 Slowakije", race:"Tour de France — diskwalificatie sprint", kort:"De wereldkampioen wordt met de schande uit de Tour gezet wegens een elleboogbeweging in een massasprint", lang:"Peter Sagan werd gediskwalificeerd uit de Tour na een incident met Mark Cavendish in de sprint. De beslissing was zeer controversieel.", diff:2 },
  "HC083": { jaar:2014, cat:"Memorabel Moment", renner:"Vincenzo Nibali", nat:"🇮🇹 Italië", race:"Tour de France — favorieten uitgevallen", kort:"De leider van de Tour rijdt zijn concurrenten kapot terwijl favoriet na favoriet bezwijkt aan blessures", lang:"De Tour begon rampzalig: meerdere grote favorieten vielen al vroeg uit door blessures. Vincenzo Nibali profiteerde maximaal en won de koers overtuigend.", diff:2 },

  "HC084": { jaar:1990, cat:"Grote Ronde", renner:"Greg LeMond", nat:"🇺🇸 VS", race:"Tour de France", kort:"De Amerikaan wint zijn derde Tour in een editie vol aanvallen en onverwachte koerswendingen", lang:"Na twee eerdere Tourzeges keerde de Amerikaan opnieuw terug als kampioen. In een Tour vol bergetappes verdedigde hij zijn leiderstrui geduldig, terwijl rivaal Claudio Chiappucci alles riskeerde. LeMond bleef kalm en behield zijn voorsprong tot Parijs.", diff:3 },
  "HC085": { jaar:1992, cat:"Grote Ronde", renner:"Miguel Induráin", nat:"🇪🇸 Spanje", race:"Giro d'Italia", kort:"De Spanjaard wint zijn enige Giro en toont dat hij ook buiten de Tour onklopbaar is", lang:"Induráin was al de onbetwiste heerser van de Tour, maar de Giro was nog onontgonnen terrein. Met een genadeloos tijdrijden en stabiele bergprestaties veroverde hij de roze trui en bewees hij dat zijn dominantie verder reikte dan één enkele ronde.", diff:3 },
  "HC086": { jaar:1993, cat:"Grote Ronde", renner:"Tony Rominger", nat:"🇨🇭 Zwitserland", race:"Vuelta a España", kort:"Zwitserse klimmer pakt zijn tweede opeenvolgende Vuelta in een dominante vertoning", lang:"De Zwitserse klimmer was op zijn best in de Spaanse bergen. Voor de tweede keer op rij won hij de Vuelta, keer op keer weg rijdend van zijn concurrenten in de zwaarste cols. Zijn tijdrijden maakte het plaatje compleet en liet zijn rivalen kansloos.", diff:3 },
  "HC087": { jaar:1994, cat:"Grote Ronde", renner:"Eugeni Berzin", nat:"🇷🇺 Rusland", race:"Giro d'Italia", kort:"Jonge Rus verslaat de grote favoriet en pakt een verrassende Giro-zege", lang:"Niemand verwachtte dat de onbekende jonge Rus de Giro zou winnen. Toch klopte hij de grote favoriet met klimmend geweld en tijdrit. Zijn overwinning is een van de grootste verrassingen in de Giro-geschiedenis en bewees dat het peloton nooit voorspelbaar is.", diff:3 },
  "HC088": { jaar:2009, cat:"Grote Ronde", renner:"Alberto Contador", nat:"🇪🇸 Spanje", race:"Giro d'Italia", kort:"Contador wint zijn enige Giro in een editie vol dramatische bergaankomsten", lang:"De Spanjaard had de Tour al op zijn naam staan, maar de Giro bleef uit zijn palmares. Na een intense strijd in de Dolomieten greep hij de roze trui en gaf die niet meer af. Het was zijn enige Giro-zege, maar hij domineerde de race van begin tot eind.", diff:3 },
  "HC089": { jaar:2011, cat:"Grote Ronde", renner:"Juan José Cobo", nat:"🇪🇸 Spanje", race:"Vuelta a España", kort:"Cobo verslaat een opkomende Britse klant met amper dertien seconden verschil", lang:"In een van de spannendste Vueltas ooit greep de Spanjaard de eindzege met een haarsmalle marge. Zijn Britse concurrent leek op weg naar zijn eerste grote ronde, maar Cobo hield stand in de slottijdrit en won de Vuelta met een marge die in een normale tijdrit in minuten uitgedrukt werd.", diff:3 },
  "HC090": { jaar:2016, cat:"Grote Ronde", renner:"Nairo Quintana", nat:"🇨🇴 Colombia", race:"Vuelta a España", kort:"Colombiaanse klimmer heerst in de Spaanse bergen en kroont een sterk seizoen", lang:"De Colombiaan was gemaakt voor de Spaanse bergen en dat bewees hij opnieuw. Met aanvallen op de zwaarste cols reed hij zijn concurrenten eruit en won hij de Vuelta overtuigend. Zijn klimmend vermogen leek grenzeloos op de Spaanse weg.", diff:2 },
  "HC091": { jaar:2023, cat:"Grote Ronde", renner:"Sepp Kuss", nat:"🇺🇸 VS", race:"Vuelta a España", kort:"Amerikaan klopt zijn eigen ploegmaats en wint de Vuelta in een uniek ploegdrama", lang:"Drie kopmannen van dezelfde ploeg vochten om de eindzege in de Vuelta. Terwijl zijn ploegmaats strategisch terugtrokken, hield de Amerikaan stand aan de top van het klassement. In een beslissende bergetappe mocht hij eindelijk rijden voor zichzelf, en hij greep zijn kans met beide handen.", diff:2 },

  "HC092": { jaar:1993, cat:"Klassiek", renner:"Gilbert Duclos-Lassalle", nat:"🇫🇷 Frankrijk", race:"Paris-Roubaix", kort:"Veteraan pakt zijn tweede Roubaix op rij en schrijft kassei-geschiedenis", lang:"Op een leeftijd dat de meeste klassieke renners al op hun retour zijn, won de Fransman voor de tweede keer op rij in de Stacade van Roubaix. Zijn doorzettingsvermogen op de kasseien en zijn ervaring in de hel van het Noorden maakten hem onklopbaar. Een prestatie die de annalen inging.", diff:3 },
  "HC093": { jaar:1997, cat:"Klassiek", renner:"Frédéric Guesdon", nat:"🇫🇷 Frankrijk", race:"Paris-Roubaix", kort:"Relatief onbekende Fransman verrast iedereen met een solo-overwinning in de Stacade", lang:"In een Roubaix vol verrassingen ontsnapte de ploegmaat van een grotere favoriet uit een vroege groep. Niemand rekende hem als winnaar, maar de Fransman reed solo naar de finish en pakte een zege die velen nog steeds verbaast. Een van de grootste verrassingen in de rijke kassei-traditie.", diff:3 },
  "HC094": { jaar:2001, cat:"Klassiek", renner:"Servais Knaven", nat:"🇳🇱 Nederland", race:"Paris-Roubaix", kort:"Nederlandse verrassing wint Roubaix met een stoutmoedige aanval op de kasseien", lang:"De Nederlander was de ploegassistent, niet de kopman. Maar in de hel van het Noorden sloeg hij zijn slag met een aanval ver voor de finish. Solo reed hij naar de Stacade en scoorde hij de grootste overwinning van zijn carrière, volledig ten koste van de verwachte favorieten.", diff:3 },

// ── RENDER ───────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id     = (params.get('id') || '').toUpperCase();
const m      = MOMENTEN[id];
const root   = document.getElementById('root');

function catClass(cat) {
  if (cat === 'Grote Ronde')         return 'grote-ronde';
  if (cat === 'Klassiek')            return 'klassiek';
  if (cat === 'Wereldkampioenschap') return 'wk';
  return 'memorabel';
}
function catIcon(cat) {
  if (cat === 'Grote Ronde')         return '🏆';
  if (cat === 'Klassiek')            return '🪨';
  if (cat === 'Wereldkampioenschap') return '🌍';
  return '⚡';
}
function dots(diff) {
  return [1,2,3].map(i =>
    `<div class="dot ${i <= diff ? 'filled' : ''}"></div>`
  ).join('');
}

if (!m) {
  root.innerHTML = `
    <div class="not-found">
      <h2>Kaart niet gevonden</h2>
      <p>Gebruik een geldige QR-code van een Hitster Cycling kaart.</p>
    </div>`;
} else {
  root.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="badge ${catClass(m.cat)}">${catIcon(m.cat)} ${m.cat}</span>
        <span class="card-id">${id}</span>
      </div>
      <div class="card-body">
        <div class="renner">${m.renner}</div>
        <div class="nat">${m.nat}</div>
        <div class="race">${m.race}</div>
        <div class="diff-row">
          <span class="diff-label">Moeilijkheid</span>
          <div class="diff-dots">${dots(m.diff)}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card-body">
        <p class="description">${m.lang}</p>
        <div class="reveal-wrap">
          <button class="btn-reveal" id="btn">🔒 Onthul het jaar</button>
          <div class="year-display" id="yr">
            <div class="year-label">Het jaar</div>
            <div class="year-number">${m.jaar}</div>
            <div class="year-sub">Leg de kaart op je tijdlijn!</div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('btn').addEventListener('click', () => {
    document.getElementById('btn').style.display = 'none';
    document.getElementById('yr').classList.add('visible');
  });
}
</script>
