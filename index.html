<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hitster Cycling</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <style>
    /* ── LOGO PALETTE ──
       Hot pink : #FF2D78   (HITSTER text)
       Cyan     : #00CCFF   (bicycle frame)
       Yellow   : #FFE500   (wheels / outer arc)
       Orange   : #FF7700   (inner arc)
       Bg       : #000000
    */
    :root {
      --pink:   #FF2D78;
      --cyan:   #00CCFF;
      --yellow: #FFE500;
      --orange: #FF7700;
      --card:   #0D0D0D;
      --muted:  rgba(255,255,255,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }

    body {
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,45,120,0.3);
      flex-shrink: 0;
      background: rgba(0,0,0,0.9);
    }
    .topbar img {
      height: 34px;
      width: 34px;
      border-radius: 6px;
      object-fit: cover;
    }
    .topbar-title {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .topbar-title .h { color: var(--pink); text-shadow: 0 0 10px rgba(255,45,120,0.7); }
    .topbar-title .c { color: var(--cyan); text-shadow: 0 0 10px rgba(0,204,255,0.6); }

    /* ── SCANNER ── */
    .scanner-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: none;
      flex-direction: column;
    }

    .video-wrapper {
      flex: 1;
      min-height: 0;
      width: 100%;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #scanner-video { width: 100%; height: 100%; object-fit: cover; }
    #scanner-canvas { display: none; }

    .scan-frame {
      position: absolute;
      width: 220px;
      height: 220px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border-color: var(--pink);
      border-style: solid;
      box-shadow: 0 0 8px var(--pink);
    }
    .corner.tl { top:0; left:0;   border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .corner.tr { top:0; right:0;  border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .corner.bl { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .corner.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), transparent);
      box-shadow: 0 0 8px var(--pink);
      animation: scanmove 2s ease-in-out infinite;
    }
    @keyframes scanmove {
      0%   { top: 8px; opacity: 0.6; }
      50%  { opacity: 1; }
      100% { top: calc(100% - 10px); opacity: 0.6; }
    }

    .scan-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse 110px 110px at 50% 42%, transparent 0%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    .scan-logo {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      opacity: 0.9;
    }

    .scan-status {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(255,255,255,0.65);
      padding: 0 20px;
    }
    .scan-status.found {
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
    }

    .scanner-fallback {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .scanner-fallback h3 { color: var(--pink); font-size: 1.1rem; margin-bottom: 14px; }
    .scanner-fallback p  { color: var(--muted); line-height: 1.5; margin-bottom: 20px; font-size: 0.9rem; }

    .url-input-group { display: flex; gap: 8px; width: 100%; max-width: 300px; }
    .url-input-group input {
      flex: 1; padding: 10px;
      border: 1px solid rgba(255,45,120,0.5);
      border-radius: 8px;
      background: rgba(255,45,120,0.06);
      color: #fff; font-size: 0.9rem;
    }
    .url-input-group input::placeholder { color: var(--muted); }
    .url-input-group button {
      padding: 10px 16px;
      background: var(--pink); color: #fff;
      border: none; border-radius: 8px;
      font-weight: 700; cursor: pointer;
      font-size: 0.9rem;
    }

    /* ── CARD CONTAINER ── */
    .card-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 12px 14px 32px;
      gap: 0;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid rgba(255,45,120,0.4);
      border-radius: 18px;
      width: 100%;
      max-width: 460px;
      box-shadow:
        0 0 0 1px rgba(0,204,255,0.06),
        0 0 24px rgba(255,45,120,0.15),
        0 6px 24px rgba(0,0,0,0.7);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px 9px;
    }

    /* Badge colors from logo arcs */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      padding: 5px 11px;
      border-radius: 20px;
      color: #000;
    }
    .badge.grote-ronde { background: var(--cyan);   color: #000; }
    .badge.klassiek    { background: var(--yellow);  color: #000; }
    .badge.wk          { background: var(--pink);    color: #fff; }
    .badge.memorabel   { background: var(--orange);  color: #000; }

    .card-id {
      font-size: 0.60rem;
      color: rgba(255,255,255,0.2);
      font-family: monospace;
      letter-spacing: 1px;
    }

    .card-body { padding: 0 14px 12px; }

    .renner {
      font-size: 1.55rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 3px;
    }
    .nat {
      font-size: 0.80rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3px;
    }
    .race {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,204,255,0.4);
      margin-bottom: 8px;
    }
    .diff-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .diff-label {
      font-size: 0.60rem;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .diff-dots { display: flex; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.12); }
    .dot.filled { background: var(--pink); box-shadow: 0 0 6px rgba(255,45,120,0.8); }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 0 14px 11px;
    }

    .description {
      font-size: 0.91rem;
      line-height: 1.62;
      color: rgba(255,255,255,0.75);
      margin-bottom: 14px;
    }

    /* ── YEAR REVEAL ── */
    .btn-reveal {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--pink);
      font-size: 0.92rem;
      font-weight: 700;
      border: 2px solid var(--pink);
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      text-shadow: 0 0 8px rgba(255,45,120,0.5);
    }
    .btn-reveal:hover { background: rgba(255,45,120,0.1); box-shadow: 0 0 18px rgba(255,45,120,0.3); }
    .btn-reveal:active { transform: scale(0.97); }

    .year-display {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 12px 14px 10px;
      border: 2px solid var(--pink);
      border-radius: 12px;
      background: rgba(255,45,120,0.06);
      box-shadow: 0 0 20px rgba(255,45,120,0.15);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .year-display.visible { display: flex; }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .year-label {
      font-size: 0.60rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: rgba(255,45,120,0.6);
    }
    .year-number {
      font-size: 3.8rem;
      font-weight: 900;
      color: var(--pink);
      line-height: 1;
      text-shadow: 0 0 30px rgba(255,45,120,0.6);
    }
    .year-sub {
      font-size: 0.70rem;
      color: var(--muted);
    }

    /* ── SCAN NEXT ── */
    .btn-scan-next {
      width: 100%;
      max-width: 460px;
      padding: 13px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 0.88rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-scan-next:hover { border-color: rgba(255,45,120,0.4); color: var(--pink); }
    .btn-scan-next:active { transform: scale(0.97); }
  </style>
</head>
<body>

<div class="topbar">
  <img src="logo.png" alt="Hitster Cycling" />
  <div class="topbar-title">
    <span class="h">HITSTER</span>&nbsp;<span class="c">CYCLING</span>
  </div>
</div>

<div class="scanner-container" id="scanner-container">
  <div class="video-wrapper" id="video-wrapper">
    <video id="scanner-video" playsinline muted></video>
    <canvas id="scanner-canvas"></canvas>
    <div class="scan-overlay"></div>
    <img src="logo.png" class="scan-logo" alt="" />
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-status" id="scan-status">Richt op de QR-code van een kaart</div>
  </div>
  <div class="scanner-fallback" id="scanner-fallback" style="display:none;">
    <h3>Camera niet beschikbaar</h3>
    <p>Voer handmatig een kaart-ID in:</p>
    <div class="url-input-group">
      <input type="text" id="url-input" placeholder="HC001, HC002, ..." />
      <button onclick="navigateToCard()">Ga</button>
    </div>
  </div>
</div>

<div class="card-container" id="card-container"></div>

<script>

  "HC003": { jaar:1993, cat:"Grote Ronde", renner:"Miguel Induráin", nat:"🇪🇸 Spanje", race:"Tour de France + Giro d'Italia", kort:"Voor het tweede jaar op rij lukt het een renner om zowel Italië als Frankrijk te veroveren", lang:"Induráin herhaalde in 1993 zijn Giro-Tour dubbel en schreef daarmee wielergeschiedenis. Voor het tweede opeenvolgende jaar won hij beide grootste rondes in dezelfde seizoen, een unieke prestatie in het moderne wielrennen.", diff:3 },

  "HC004": { jaar:1995, cat:"Grote Ronde", renner:"Miguel Induráin", nat:"🇪🇸 Spanje", race:"Tour de France", kort:"Een renner schrijft wielrengeschiedenis met zijn vijfde opeenvolgende overwinning in de grootste rittenkoers ter wereld", lang:"Miguel Induráin won in 1995 zijn vijfde Tour de France op rij, een record dat tot dan toe nooit vertoond was in het moderne wielrennen en nog steeds gedeeld staat met Eddy Merckx.", diff:1 },

  "HC005": { jaar:1996, cat:"Grote Ronde", renner:"Bjarne Riis", nat:"🇩🇰 Denemarken", race:"Tour de France", kort:"Een Deen verrast de wielerwereld en zet de beste klimmers op de Mont Ventoux volledig in de wind", lang:"Bjarne Riis won de Tour de France 1996 in een sensationele prestatie die de wielerwereld volledig verraste. Met zijn vermogen op de Mont Ventoux nam hij een decisieve voorsprong op zijn concurrenten en controleerde die tot Parijs.", diff:2 },

  "HC009": { jaar:2007, cat:"Grote Ronde", renner:"Alberto Contador", nat:"🇪🇸 Spanje", race:"Tour de France", kort:"Een explosieve Spanjaard verslaat een Duitser in de bergen en zet zijn eerste grote stempel op het wielrennen", lang:"Alberto Contador won in 2007 zijn eerste Tour de France op dramatische wijze, met explosieve aanvallen in de bergen die zijn concurrenten volledig vernietigden. Voor Cadel Evans en Levi Leipheimer finishte hij, wat zijn dominantie in dat seizoen onderstreepte.", diff:2 },

  "HC021": { jaar:2020, cat:"Grote Ronde", renner:"Tadej Pogačar", nat:"🇸🇮 Slovenië", race:"Tour de France", kort:"Een jonge Sloveense renner voert een spektakulaire manoeuvre uit en verrast alle favorieten in de slottijdrit", lang:"Tadej Pogačar won in 2020 op 21-jarige leeftijd de Tour de France in een spectaculaire slottijdrit, waardoor hij Primož Roglič van de gele trui afhielp in het allerlaatste onderdeel.", diff:1 },

// ── HELPERS ──────────────────────────────────────────────────────────────────
function catClass(c){return{"Grote Ronde":"grote-ronde","Klassiek":"klassiek","Wereldkampioenschap":"wk","Memorabel":"memorabel"}[c]||"memorabel";}
function catIcon(c){return{"Grote Ronde":"🏆","Klassiek":"🏔️","Wereldkampioenschap":"🌍","Memorabel":"⚡"}[c]||"⚡";}
function dots(n){return[0,1,2].map(i=>`<div class="dot${i<n?' filled':''}"></div>`).join('');}

// ── SCANNER ───────────────────────────────────────────────────────────────────
let scanning = false;
let scanInterval = null;
const video      = document.getElementById('scanner-video');
const canvas     = document.getElementById('scanner-canvas');
const ctx        = canvas.getContext('2d');
const scannerEl  = document.getElementById('scanner-container');
const cardEl     = document.getElementById('card-container');
const fallbackEl = document.getElementById('scanner-fallback');
const videoWrap  = document.getElementById('video-wrapper');
const statusEl   = document.getElementById('scan-status');

function startScanning() {
  scanning = true;
  if (scanInterval) clearInterval(scanInterval);
  scanInterval = setInterval(scanTick, 200);
}

async function startScanner() {
  scannerEl.style.display = 'flex';
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    videoWrap.style.display = 'none';
    fallbackEl.style.display = 'flex';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = stream;
    // Start scan loop as soon as video has enough data
    video.addEventListener('canplay', startScanning, { once: true });
    // Fallback: also start after 2s even if canplay didn't fire
    setTimeout(() => { if (!scanning) startScanning(); }, 2000);
    video.play().catch(e => {
      console.warn('play:', e);
      startScanning();
    });
  } catch (err) {
    console.warn('Camera error:', err);
    videoWrap.style.display = 'none';
    fallbackEl.style.display = 'flex';
  }
}

function scanTick() {
  if (!scanning) return;
  // Need actual video dimensions
  if (!video.videoWidth || !video.videoHeight) return;

  // Draw full resolution frame
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  let imgData;
  try { imgData = ctx.getImageData(0, 0, canvas.width, canvas.height); }
  catch(e) { return; }

  const code = jsQR(imgData.data, imgData.width, imgData.height, {
    inversionAttempts: "attemptBoth"
  });

  if (code && code.data) {
    const d = code.data.trim();
    statusEl.textContent = '✓ QR gevonden!';
    statusEl.classList.add('found');

    // 1) Try to extract HC card ID
    const hcMatch = d.match(/[?&]id=(HC\d{3})/i) || d.match(/\b(HC\d{3})\b/i);
    if (hcMatch) {
      stopScanner();
      window.location.href = window.location.origin + window.location.pathname + '?id=' + hcMatch[1].toUpperCase();
      return;
    }
    // 2) Navigate to any URL directly
    if (d.startsWith('http')) {
      stopScanner();
      window.location.href = d;
      return;
    }
  }
}

function stopScanner() {
  scanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
}

function navigateToCard() {
  const v = document.getElementById('url-input').value.trim().toUpperCase();
  if (MOMENTEN[v]) { window.location.href = '?id=' + v; }
  else alert('Ongeldig ID. Gebruik bijv. HC001');
}

// ── ROUTING ───────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const m  = MOMENTEN[id];

if (!id || !m) {
  startScanner();
} else {
  scannerEl.style.display = 'none';
  cardEl.style.display    = 'flex';

  cardEl.innerHTML = `
    <div class="card">
      <div class="card-top">
        <span class="badge ${catClass(m.cat)}">${catIcon(m.cat)} ${m.cat}</span>
        <span class="card-id">${id}</span>
      </div>
      <div class="card-body">
        <div class="renner">${m.renner}</div>
        <div class="nat">${m.nat}</div>
        <div class="race">${m.race}</div>
        <div class="diff-row">
          <span class="diff-label">Moeilijkheid</span>
          <div class="diff-dots">${dots(m.diff)}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card-body">
        <p class="description">${m.lang}</p>
        <div>
          <button class="btn-reveal" id="btn">🔒 Onthul het jaar</button>
          <div class="year-display" id="yr">
            <div class="year-label">Het jaar</div>
            <div class="year-number">${m.jaar}</div>
            <div class="year-sub">Leg de kaart op je tijdlijn!</div>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-scan-next" onclick="window.location.href=\'?\'">📷 Scan volgend kaartje</button>`;

  document.getElementById('btn').addEventListener('click', () => {
    document.getElementById('btn').style.display = 'none';
    const yr = document.getElementById('yr');
    yr.classList.add('visible');
    setTimeout(() => yr.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
  });
}
</script>
