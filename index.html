<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster Cycling</title>
  <style>
    :root {
      --yellow: #FFD700;
      --pink:   #E8407A;
      --red:    #D62828;
      --blue:   #1A3A5C;
      --green:  #2E7D32;
      --purple: #6A1B9A;
      --light:  #F5F5F5;
      --card-bg:#FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0D1B2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 40px;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      background: var(--blue);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--yellow);
    }
    .topbar .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--yellow);
      letter-spacing: -0.5px;
    }
    .topbar .logo span { color: #fff; }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: 20px;
      margin: 24px 16px 0;
      max-width: 480px;
      width: calc(100% - 32px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 22px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 5px 11px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge.grote-ronde   { background: #D6E4F0; color: #1A3A5C; }
    .badge.klassiek      { background: #D5F5E3; color: #1B5E20; }
    .badge.wk            { background: #FCF3CF; color: #795600; }
    .badge.memorabel     { background: #FADBD8; color: #922B21; }

    .card-id {
      font-size: 0.7rem;
      color: #aaa;
      font-weight: 600;
      padding-top: 4px;
      white-space: nowrap;
    }

    .card-body { padding: 0 22px 22px; }

    .renner {
      font-size: 1.35rem;
      font-weight: 800;
      color: #111;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .race {
      font-size: 0.88rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .nat {
      font-size: 0.88rem;
      color: #777;
      margin-bottom: 16px;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 0 22px 18px;
    }

    .description {
      font-size: 1rem;
      line-height: 1.65;
      color: #333;
      margin-bottom: 20px;
    }

    /* ── YEAR REVEAL ── */
    .reveal-wrap {
      margin-top: 4px;
    }

    .btn-reveal {
      width: 100%;
      padding: 16px;
      background: var(--blue);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-reveal:active { transform: scale(0.97); }
    .btn-reveal:hover  { background: #1e4a7a; }

    .year-display {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 20px;
      background: linear-gradient(135deg, var(--blue), #2a5298);
      border-radius: 12px;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .year-display.visible { display: flex; }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .year-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--yellow);
    }
    .year-number {
      font-size: 4rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .year-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
    }

    /* ── DIFFICULTY ── */
    .diff-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .diff-label {
      font-size: 0.75rem;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .diff-dots {
      display: flex;
      gap: 4px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ddd;
    }
    .dot.filled { background: var(--yellow); }

    /* ── NOT FOUND ── */
    .not-found {
      color: #fff;
      text-align: center;
      padding: 60px 20px;
    }
    .not-found h2 { font-size: 1.5rem; margin-bottom: 10px; color: var(--yellow); }
    .not-found p  { color: #aaa; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.72rem;
    }
  </style>
</head>

const params = new URLSearchParams(window.location.search);
const id     = (params.get('id') || '').toUpperCase();
const m      = MOMENTEN[id];
const root   = document.getElementById('root');

function catClass(cat) {
  if (cat === 'Grote Ronde')         return 'grote-ronde';
  if (cat === 'Klassiek')            return 'klassiek';
  if (cat === 'Wereldkampioenschap') return 'wk';
  return 'memorabel';
}
function catIcon(cat) {
  if (cat === 'Grote Ronde')         return '🏆';
  if (cat === 'Klassiek')            return '🪨';
  if (cat === 'Wereldkampioenschap') return '🌍';
  return '⚡';
}
function dots(diff) {
  return [1,2,3].map(i =>
    `<div class="dot ${i <= diff ? 'filled' : ''}"></div>`
  ).join('');
}

if (!m) {
  root.innerHTML = `
    <div class="not-found">
      <h2>Kaart niet gevonden</h2>
      <p>Gebruik een geldige QR-code van een Hitster Cycling kaart.</p>
    </div>`;
} else {
  root.innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="badge ${catClass(m.cat)}">${catIcon(m.cat)} ${m.cat}</span>
        <span class="card-id">${id}</span>
      </div>
      <div class="card-body">
        <div class="renner">${m.renner}</div>
        <div class="nat">${m.nat}</div>
        <div class="race">${m.race}</div>
        <div class="diff-row">
          <span class="diff-label">Moeilijkheid</span>
          <div class="diff-dots">${dots(m.diff)}</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="card-body">
        <p class="description">${m.lang}</p>
        <div class="reveal-wrap">
          <button class="btn-reveal" id="btn">🔒 Onthul het jaar</button>
          <div class="year-display" id="yr">
            <div class="year-label">Het jaar</div>
            <div class="year-number">${m.jaar}</div>
            <div class="year-sub">Leg de kaart op je tijdlijn!</div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('btn').addEventListener('click', () => {
    document.getElementById('btn').style.display = 'none';
    document.getElementById('yr').classList.add('visible');
  });
}
